AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Solis Somatic Backend

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: 256

Conditions:
  HasSesTopicArn: !Not [!Equals [!Ref SesNotificationTopicArn, ""]]
  HasCognitoKmsKey: !Not [!Equals [!Ref CognitoKmsKeyId, ""]]

Resources:
  # Shared Layer (supabase-py, python-jose, etc.)
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: solis-shared-deps
      ContentUri: layers/shared/
      CompatibleRuntimes:
        - python3.13
      CompatibleArchitectures:
        - x86_64
    Metadata:
      BuildMethod: python3.13

  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/create_order/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /orders
            Method: POST

  SendTransactionalEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/send_transactional_email/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SES_REGION: !Ref SesRegion
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /send-email
            Method: POST

  EcpayCreatePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/ecpay_create_payment/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          ECPAY_MERCHANT_ID: !Ref EcpayMerchantId
          ECPAY_HASH_KEY: !Ref EcpayHashKey
          ECPAY_HASH_IV: !Ref EcpayHashIV
          API_BASE_URL: !Ref ApiBaseUrl
          SITE_URL: !Ref SiteUrl
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /ecpay-create-payment
            Method: POST

  EcpayCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/ecpay_callback/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          ECPAY_HASH_KEY: !Ref EcpayHashKey
          ECPAY_HASH_IV: !Ref EcpayHashIV
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /ecpay-callback
            Method: POST

  HandleEmailUnsubscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/handle_email_unsubscribe/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /unsubscribe
            Method: GET

  HandleEmailSuppressionFunction:
    Type: AWS::Serverless::Function
    Condition: HasSesTopicArn
    Properties:
      CodeUri: functions/handle_email_suppression/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
      Events:
        SNS:
          Type: SNS
          Properties:
            Topic: !Ref SesNotificationTopicArn

  NotifyPublishedPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/notify_published_posts/
      Handler: app.handler
      Timeout: 300
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction

  EmailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: solis-email-queue
      VisibilityTimeout: 120
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailDeadLetterQueue.Arn
        maxReceiveCount: 3

  EmailDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: solis-email-dlq
      MessageRetentionPeriod: 1209600

  ProcessEmailQueueFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/process_email_queue/
      Handler: app.handler
      Timeout: 120
      Environment:
        Variables:
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction
        - SQSPollerPolicy:
            QueueName: !GetAtt EmailQueue.QueueName
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt EmailQueue.Arn
            BatchSize: 10
            Enabled: true

  AuthEmailHookFunction:
    Type: AWS::Serverless::Function
    Condition: HasCognitoKmsKey
    Properties:
      CodeUri: functions/auth_email_hook/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SES_REGION: !Ref SesRegion
          KMS_KEY_ID: !Ref CognitoKmsKeyId
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/${CognitoKmsKeyId}"

  # ─── Assets (images) ────────────────────────────────────────────────────────

  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "solis-assets-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ['*']
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AssetsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: solis-assets-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AssetsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_200
        Comment: solis assets CDN
        Origins:
          - Id: AssetsBucketOrigin
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt AssetsOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: AssetsBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${AssetsBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetsDistribution}"

  # ─── Phase 6: Video Streaming ───────────────────────────────────────────────

  # S3: Raw upload bucket (private, lifecycle delete after 7 days)
  VideoRawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "solis-videos-raw-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteRawAfter7Days
            Status: Enabled
            ExpirationInDays: 7
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [PUT]
            AllowedHeaders: ['*']
            ExposedHeaders: [ETag]
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # S3: HLS output bucket (private, CloudFront OAC only)
  VideoHlsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "solis-videos-hls-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET]
            AllowedHeaders: ['*']
            MaxAge: 86400
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CloudFront OAC
  VideoOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: solis-video-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront cache policy: no cache for m3u8
  VideoManifestCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: solis-hls-manifest
        DefaultTTL: 0
        MinTTL: 0
        MaxTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: false
          EnableAcceptEncodingBrotli: false
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  # CloudFront cache policy: cache ts segments 1 day
  VideoSegmentCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: solis-hls-segment
        DefaultTTL: 86400
        MinTTL: 86400
        MaxTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: false
          EnableAcceptEncodingBrotli: false
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  # CloudFront Distribution
  VideoDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: HlsBucketOrigin
            DomainName: !GetAtt VideoHlsBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt VideoOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: HlsBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          TrustedKeyGroups:
            - !Ref CfKeyGroupId
          CachePolicyId: !Ref VideoSegmentCachePolicy
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        CacheBehaviors:
          - PathPattern: "*.m3u8"
            TargetOriginId: HlsBucketOrigin
            ViewerProtocolPolicy: redirect-to-https
            TrustedKeyGroups:
              - !Ref CfKeyGroupId
            CachePolicyId: !Ref VideoManifestCachePolicy
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]

  # HLS bucket policy: allow CloudFront OAC
  VideoHlsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VideoHlsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${VideoHlsBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${VideoDistribution}"

  # IAM Role for Batch job container
  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BatchJobPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${VideoRawBucket}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${VideoHlsBucket}"
                  - !Sub "arn:aws:s3:::${VideoHlsBucket}/*"

  # IAM Role for Fargate task execution
  BatchExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # AWS Batch Compute Environment (Fargate)
  BatchComputeEnv:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: FARGATE
        MaxvCpus: 4
        Subnets:
          - !Ref BatchSubnetId
        SecurityGroupIds:
          - !Ref BatchSgId

  # AWS Batch Job Queue
  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnv
      Priority: 1

  # AWS Batch Job Definition (FFmpeg)
  FfmpegJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      PlatformCapabilities:
        - FARGATE
      ContainerProperties:
        Image: !Ref FfmpegImageUri
        JobRoleArn: !GetAtt BatchJobRole.Arn
        ExecutionRoleArn: !GetAtt BatchExecutionRole.Arn
        NetworkConfiguration:
          AssignPublicIp: ENABLED
        ResourceRequirements:
          - Type: VCPU
            Value: "2"
          - Type: MEMORY
            Value: "4096"

  # Lambda: check course access for logged-in user
  CourseAccessFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/course_access/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          COGNITO_REGION: !Sub "${AWS::Region}"
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /course-access
            Method: POST

  # Lambda: admin Supabase proxy (requires Cognito admin group)
  AdminDbFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/admin_db/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          COGNITO_REGION: !Sub "${AWS::Region}"
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /admin-db
            Method: POST

  # Lambda: sync Cognito user to Supabase Auth and return Supabase JWT
  SyncAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/sync_auth/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SUPABASE_JWT_SECRET: !Ref SupabaseJwtSecret
          COGNITO_REGION: !Sub "${AWS::Region}"
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /sync-auth
            Method: POST

  # Lambda: trigger AWS Batch job on S3 upload (S3 notification set via setup-s3-notification.sh)
  TriggerBatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/trigger_batch/
      Handler: app.handler
      Environment:
        Variables:
          JOB_QUEUE: !Ref BatchJobQueue
          JOB_DEFINITION: !Ref FfmpegJobDefinition
          HLS_BUCKET: !Ref VideoHlsBucket
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: batch:SubmitJob
              Resource: "*"

  # Lambda: issue CloudFront Signed Cookie
  IssueCookieFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/issue_cookie/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          COGNITO_REGION: !Sub "${AWS::Region}"
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          CF_DOMAIN: !GetAtt VideoDistribution.DomainName
          CF_KEY_ID_SSM: /solis/cf_key_id
          CF_PRIVATE_KEY_SSM: /solis/cf_private_key
          COOKIE_TTL: "21600"
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/solis/cf_private_key"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/solis/cf_key_id"
            - Effect: Allow
              Action: kms:Decrypt
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /issue-cookie
            Method: POST

  # Lambda: upload presigned URL (points to raw bucket)
  GetUploadPresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/get_upload_presigned_url/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          VIDEO_BUCKET: !Ref VideoRawBucket
          ASSETS_BUCKET: !Ref AssetsBucket
          ASSETS_CF_DOMAIN: !GetAtt AssetsDistribution.DomainName
          COGNITO_REGION: !Sub "${AWS::Region}"
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          UPLOAD_URL_EXPIRES: "900"
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource:
                - !Sub "arn:aws:s3:::${VideoRawBucket}/*"
                - !Sub "arn:aws:s3:::${AssetsBucket}/*"
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload-url
            Method: POST

Parameters:
  SupabaseUrl:
    Type: String
    Default: https://clyvbsxlmhozbaoktfsl.supabase.co
  SupabaseServiceKey:
    Type: String
    NoEcho: true
    Description: Supabase Service Role Key
  SupabaseJwtSecret:
    Type: String
    NoEcho: true
    Description: Supabase JWT Secret (from project settings)
  SesRegion:
    Type: String
    Default: ap-southeast-1
    Description: AWS SES region
  EcpayMerchantId:
    Type: String
    Default: "3416478"
  EcpayHashKey:
    Type: String
    NoEcho: true
    Default: "2uHS7ko5TkDNY2Ea"
  EcpayHashIV:
    Type: String
    NoEcho: true
    Default: "hg65fQfi1xx27fky"
  ApiBaseUrl:
    Type: String
    Default: "https://dhthoeib97.execute-api.ap-east-2.amazonaws.com/prod"
  SiteUrl:
    Type: String
    Default: "https://www.solisforest.com"
  SesNotificationTopicArn:
    Type: String
    Default: ""
  CognitoKmsKeyId:
    Type: String
    Default: ""
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID for JWT verification
  CfKeyGroupId:
    Type: String
    Description: CloudFront Key Group ID for Signed Cookie
  FfmpegImageUri:
    Type: String
    Description: ECR image URI for FFmpeg Batch job
  BatchSubnetId:
    Type: String
    Description: Subnet ID for AWS Batch Fargate
  BatchSgId:
    Type: String
    Description: Security Group ID for AWS Batch Fargate

Outputs:
  AssetsBucketName:
    Value: !Ref AssetsBucket
  AssetsDistributionDomain:
    Value: !GetAtt AssetsDistribution.DomainName
  ApiUrl:
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  EmailQueueUrl:
    Value: !Ref EmailQueue
  EmailQueueArn:
    Value: !GetAtt EmailQueue.Arn
  VideoRawBucketName:
    Value: !Ref VideoRawBucket
  VideoHlsBucketName:
    Value: !Ref VideoHlsBucket
  VideoDistributionDomain:
    Value: !GetAtt VideoDistribution.DomainName
  TriggerBatchFunctionArn:
    Value: !GetAtt TriggerBatchFunction.Arn
