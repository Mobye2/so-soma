AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Solis Somatic Backend

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: 256

Resources:
  # Shared Layer (supabase-py, python-jose, etc.)
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: solis-shared-deps
      ContentUri: layers/shared/
      CompatibleRuntimes:
        - python3.13
      CompatibleArchitectures:
        - x86_64
    Metadata:
      BuildMethod: python3.13

  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'https://www.solisforest.com,http://localhost:5173'"
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/create_order/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /orders
            Method: POST

  SendTransactionalEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/send_transactional_email/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SES_REGION: !Ref SesRegion
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /send-email
            Method: POST

  EcpayCreatePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/ecpay_create_payment/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          ECPAY_MERCHANT_ID: !Ref EcpayMerchantId
          ECPAY_HASH_KEY: !Ref EcpayHashKey
          ECPAY_HASH_IV: !Ref EcpayHashIV
          API_BASE_URL: !Ref ApiBaseUrl
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /ecpay-create-payment
            Method: POST

  EcpayCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/ecpay_callback/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          ECPAY_HASH_KEY: !Ref EcpayHashKey
          ECPAY_HASH_IV: !Ref EcpayHashIV
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /ecpay-callback
            Method: POST

Parameters:
  SupabaseUrl:
    Type: String
    Default: https://clyvbsxlmhozbaoktfsl.supabase.co
  SupabaseServiceKey:
    Type: String
    NoEcho: true
    Description: Supabase Service Role Key
  SesRegion:
    Type: String
    Default: ap-southeast-1
    Description: AWS SES region (use a region where SES is available)
  EcpayMerchantId:
    Type: String
    Default: ""
    Description: ECPay Merchant ID
  EcpayHashKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: ECPay Hash Key
  EcpayHashIV:
    Type: String
    NoEcho: true
    Default: ""
    Description: ECPay Hash IV
  ApiBaseUrl:
    Type: String
    Default: "https://placeholder.execute-api.ap-southeast-1.amazonaws.com/prod"
    Description: API Gateway base URL (update after first deploy)

Outputs:
  ApiUrl:
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
