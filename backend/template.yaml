AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Solis Somatic Backend

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: 256

Conditions:
  HasSesTopicArn: !Not [!Equals [!Ref SesNotificationTopicArn, ""]]
  HasCognitoKmsKey: !Not [!Equals [!Ref CognitoKmsKeyId, ""]]

Resources:
  # Shared Layer (supabase-py, python-jose, etc.)
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: solis-shared-deps
      ContentUri: layers/shared/
      CompatibleRuntimes:
        - python3.13
      CompatibleArchitectures:
        - x86_64
    Metadata:
      BuildMethod: python3.13

  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/create_order/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /orders
            Method: POST

  SendTransactionalEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/send_transactional_email/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SES_REGION: !Ref SesRegion
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /send-email
            Method: POST

  EcpayCreatePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/ecpay_create_payment/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          ECPAY_MERCHANT_ID: !Ref EcpayMerchantId
          ECPAY_HASH_KEY: !Ref EcpayHashKey
          ECPAY_HASH_IV: !Ref EcpayHashIV
          API_BASE_URL: !Ref ApiBaseUrl
          SITE_URL: !Ref SiteUrl
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /ecpay-create-payment
            Method: POST

  EcpayCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/ecpay_callback/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          ECPAY_HASH_KEY: !Ref EcpayHashKey
          ECPAY_HASH_IV: !Ref EcpayHashIV
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /ecpay-callback
            Method: POST

  HandleEmailUnsubscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/handle_email_unsubscribe/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /unsubscribe
            Method: GET

  HandleEmailSuppressionFunction:
    Type: AWS::Serverless::Function
    Condition: HasSesTopicArn
    Properties:
      CodeUri: functions/handle_email_suppression/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
      Events:
        SNS:
          Type: SNS
          Properties:
            Topic: !Ref SesNotificationTopicArn

  NotifyPublishedPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/notify_published_posts/
      Handler: app.handler
      Timeout: 300
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceKey
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction

  EmailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: solis-email-queue
      VisibilityTimeout: 120
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailDeadLetterQueue.Arn
        maxReceiveCount: 3

  EmailDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: solis-email-dlq
      MessageRetentionPeriod: 1209600

  ProcessEmailQueueFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/process_email_queue/
      Handler: app.handler
      Timeout: 120
      Environment:
        Variables:
          SEND_EMAIL_FUNCTION_NAME: !Ref SendTransactionalEmailFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SendTransactionalEmailFunction
        - SQSPollerPolicy:
            QueueName: !GetAtt EmailQueue.QueueName
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt EmailQueue.Arn
            BatchSize: 10
            Enabled: true

  AuthEmailHookFunction:
    Type: AWS::Serverless::Function
    Condition: HasCognitoKmsKey
    Properties:
      CodeUri: functions/auth_email_hook/
      Handler: app.handler
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          SES_REGION: !Ref SesRegion
          KMS_KEY_ID: !Ref CognitoKmsKeyId
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/${CognitoKmsKeyId}"

Parameters:
  SupabaseUrl:
    Type: String
    Default: https://clyvbsxlmhozbaoktfsl.supabase.co
  SupabaseServiceKey:
    Type: String
    NoEcho: true
    Description: Supabase Service Role Key
  SesRegion:
    Type: String
    Default: ap-southeast-1
    Description: AWS SES region (use a region where SES is available)
  EcpayMerchantId:
    Type: String
    Default: "3416478"
    Description: ECPay Merchant ID
  EcpayHashKey:
    Type: String
    NoEcho: true
    Default: "REMOVED"
    Description: ECPay Hash Key
  EcpayHashIV:
    Type: String
    NoEcho: true
    Default: "REMOVED"
    Description: ECPay Hash IV
  ApiBaseUrl:
    Type: String
    Default: "https://dhthoeib97.execute-api.ap-east-2.amazonaws.com/prod"
    Description: API Gateway base URL
  SiteUrl:
    Type: String
    Default: "https://www.solisforest.com"
    Description: Frontend site URL for ECPay return redirect
  SesNotificationTopicArn:
    Type: String
    Default: ""
    Description: SNS Topic ARN for SES bounce/complaint notifications
  CognitoKmsKeyId:
    Type: String
    Default: ""
    Description: KMS Key ID used by Cognito Custom Email Sender

Outputs:
  ApiUrl:
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  EmailQueueUrl:
    Value: !Ref EmailQueue
  EmailQueueArn:
    Value: !GetAtt EmailQueue.Arn
