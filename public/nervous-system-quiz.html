<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>神經系統身心狀態全景測驗</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --clr-teal: #1D9E75; --clr-teal-dark: #0F6E56; --clr-teal-deeper: #085041;
      --clr-teal-bg: #E1F5EE; --clr-border: rgba(0,0,0,0.10); --clr-border-md: rgba(0,0,0,0.18);
      --clr-text: #1a1a1a; --clr-text-sec: #555; --clr-text-hint: #888;
      --clr-bg: #ffffff; --clr-surface: #f7f7f5;
      --radius-sm: 8px; --radius-md: 12px;
      --font: -apple-system,'Helvetica Neue',Arial,'PingFang TC','Microsoft JhengHei',sans-serif;
    }
    body { font-family: var(--font); color: var(--clr-text); background: transparent; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    .qc { max-width: 600px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    .prog-out { height: 3px; background: var(--clr-border); border-radius: 3px; margin-bottom: 2rem; }
    .prog-in { height: 3px; background: var(--clr-teal); border-radius: 3px; transition: width .4s ease; }
    .dim-lbl { font-size: 11px; letter-spacing: .07em; color: var(--clr-text-hint); margin-bottom: .4rem; }
    .q-title { font-size: 18px; font-weight: 600; color: var(--clr-text); line-height: 1.45; margin-bottom: .35rem; }
    .q-sub { font-size: 13px; color: var(--clr-text-sec); margin-bottom: 1.25rem; line-height: 1.6; }
    .opt-btn { display: block; width: 100%; text-align: left; padding: 13px 16px; margin-bottom: 9px; background: var(--clr-bg); border: 1px solid var(--clr-border); border-radius: var(--radius-md); font-size: 14px; color: var(--clr-text); cursor: pointer; transition: border-color .15s, background .15s; line-height: 1.5; font-family: var(--font); }
    .opt-btn:hover { border-color: var(--clr-teal); background: var(--clr-teal-bg); }
    .opt-btn.selected { border: 1.5px solid var(--clr-teal); background: var(--clr-teal-bg); color: var(--clr-teal-deeper); }
    .opt-ltr { display: block; font-size: 10px; font-weight: 600; color: var(--clr-text-hint); margin-bottom: 3px; }
    .opt-btn.selected .opt-ltr { color: var(--clr-teal-dark); }
    .freq-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 1rem; }
    .freq-btn { padding: 11px 6px; background: var(--clr-bg); border: 1px solid var(--clr-border); border-radius: var(--radius-sm); font-size: 12px; color: var(--clr-text-sec); cursor: pointer; text-align: center; transition: border-color .15s, background .15s; line-height: 1.4; font-family: var(--font); }
    .freq-btn:hover { border-color: var(--clr-teal); background: var(--clr-teal-bg); }
    .freq-btn.selected { border: 1.5px solid var(--clr-teal); background: var(--clr-teal-bg); color: var(--clr-teal-deeper); font-weight: 600; }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
    .btn-back { background: none; border: none; font-size: 13px; color: var(--clr-text-hint); cursor: pointer; padding: 0; font-family: var(--font); }
    .btn-next { padding: 11px 24px; background: var(--clr-bg); border: 1px solid var(--clr-border-md); border-radius: var(--radius-sm); font-size: 14px; color: var(--clr-text); cursor: pointer; transition: background .15s; font-family: var(--font); }
    .btn-next:hover { background: var(--clr-surface); }
    .btn-next:disabled { opacity: .3; cursor: default; }
    .btn-next.primary { background: var(--clr-teal); color: #fff; border-color: var(--clr-teal); }
    .btn-next.primary:hover { background: var(--clr-teal-dark); }
    .divider { height: 1px; background: var(--clr-border); margin: 1.5rem 0; }
    .state-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: .85rem; }
    .result-title { font-size: 22px; font-weight: 700; line-height: 1.35; margin-bottom: .65rem; }
    .result-desc { font-size: 14px; color: var(--clr-text-sec); line-height: 1.8; margin-bottom: 1.5rem; }
    .radar-wrap { position: relative; width: 100%; max-width: 360px; height: 320px; margin: .5rem auto 1rem; }
    .panorama-legend { background: var(--clr-surface); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 1rem; font-size: 12px; color: var(--clr-text-sec); line-height: 1.7; }
    .panorama-legend b { color: var(--clr-text); font-weight: 600; }
    .kaia-note { background: var(--clr-teal-bg); border-left: 3px solid var(--clr-teal); border-radius: 0 var(--radius-md) var(--radius-md) 0; padding: 14px 16px; margin: 0 0 1.5rem; }
    .kaia-note-hd { font-size: 11px; font-weight: 600; letter-spacing: .07em; color: var(--clr-teal-dark); margin-bottom: 6px; }
    .kaia-note-body { font-size: 13px; color: var(--clr-text); line-height: 1.75; }
    .sbar-section { margin-bottom: 1.5rem; }
    .sbar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .sbar-lbl { font-size: 12px; color: var(--clr-text-sec); width: 72px; flex-shrink: 0; }
    .sbar-track { flex: 1; height: 5px; background: var(--clr-border); border-radius: 5px; overflow: hidden; }
    .sbar-fill { height: 5px; border-radius: 5px; transition: width .7s ease .1s; }
    .sbar-pct { font-size: 11px; color: var(--clr-text-hint); width: 30px; text-align: right; }
    .sec-lbl { font-size: 11px; font-weight: 600; letter-spacing: .07em; color: var(--clr-text-hint); margin-bottom: .85rem; }
    .g-tip { background: var(--clr-surface); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 9px; }
    .g-tip-title { font-size: 14px; font-weight: 600; color: var(--clr-text); margin-bottom: 5px; }
    .g-tip-body { font-size: 13px; color: var(--clr-text-sec); line-height: 1.7; }
    .dim-card { background: var(--clr-bg); border: 1px solid var(--clr-border); border-left-width: 3px; border-radius: 0 var(--radius-md) var(--radius-md) 0; padding: 14px 16px; margin-bottom: 10px; }
    .dim-card-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .dim-card-name { font-size: 14px; font-weight: 600; }
    .dim-badge { font-size: 11px; padding: 2px 9px; border-radius: 10px; }
    .score-track { height: 4px; background: var(--clr-border); border-radius: 4px; margin: 5px 0 10px; }
    .score-fill { height: 4px; border-radius: 4px; }
    .dim-insight { font-size: 13px; color: var(--clr-text-sec); line-height: 1.7; margin-bottom: 9px; }
    .dim-tip-box { font-size: 12px; color: var(--clr-text-sec); line-height: 1.7; padding: 10px 12px; background: var(--clr-surface); border-radius: var(--radius-sm); }
    .tip-micro { font-size: 10px; font-weight: 600; letter-spacing: .05em; color: var(--clr-text-hint); display: block; margin-bottom: 4px; }
    .disclaimer { font-size: 11px; color: var(--clr-text-hint); line-height: 1.75; margin: 1rem 0 .85rem; }
    .restart-btn { padding: 10px 24px; background: var(--clr-bg); border: 1px solid var(--clr-border-md); border-radius: var(--radius-sm); font-size: 13px; color: var(--clr-text-sec); cursor: pointer; font-family: var(--font); }
    .restart-btn:hover { background: var(--clr-surface); }
    /* === Infographic-style summary card (soft + playful) === */
    .infocard { position: relative; background: #FBF7F0; border: 1px solid #D9CFBF; border-radius: 18px; padding: 20px 18px 18px; margin-bottom: 1.75rem; box-shadow: 3px 3px 0 #E8DFCC; overflow: hidden; }
    .infocard-mascot { position: absolute; top: 8px; right: 8px; width: 86px; height: 86px; opacity: .95; pointer-events: none; }
    .infocard-eyebrow { font-size: 11px; color: var(--clr-text-sec); margin-bottom: 6px; padding-right: 84px; }
    .infocard-title { font-size: 30px; font-weight: 900; line-height: 1.15; color: var(--clr-text); margin-bottom: 10px; letter-spacing: .02em; padding-right: 84px; }
    .infocard-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .infocard-tag { font-size: 11px; padding: 4px 10px; border-radius: 999px; font-weight: 600; border: 1px solid currentColor; background: #fff; }
    .infocard-stat { font-size: 13px; color: var(--clr-text-sec); margin-bottom: 14px; line-height: 1.6; }
    .infocard-stat b { font-size: 20px; font-weight: 800; color: var(--clr-teal-dark); margin: 0 2px; }
    .ic-block { background: #fff; border: 1px solid #E8DFCC; border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
    .ic-block-hd { background: #F0E9DA; color: #5C4A2E; font-size: 12px; font-weight: 700; padding: 8px 14px; letter-spacing: .04em; display: flex; align-items: center; gap: 6px; }
    .ic-block-hd .ic-emoji { font-size: 14px; }
    .ic-block-body { padding: 13px 15px; font-size: 13.5px; line-height: 1.75; color: var(--clr-text); }
    .ic-block-body.quote { color: #4A6741; }
    .ic-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .ic-stat { background: #fff; border: 1px solid #E8DFCC; border-radius: 14px; overflow: hidden; text-align: center; }
    .ic-stat-hd { background: #F0E9DA; color: #5C4A2E; font-size: 11px; font-weight: 700; padding: 6px 4px; letter-spacing: .04em; }
    .ic-stat-body { padding: 11px 6px; }
    .ic-stat-main { font-size: 16px; font-weight: 800; line-height: 1.2; }
    .ic-stat-sub { font-size: 10.5px; color: var(--clr-text-sec); margin-top: 4px; line-height: 1.4; }
    .ic-action { background: #E1F5EE; border: 1px dashed #1D9E75; border-radius: 14px; padding: 13px 15px; display: flex; gap: 12px; align-items: flex-start; }
    .ic-action-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
    .ic-action-text { flex: 1; }
    .ic-action-lbl { font-size: 11px; font-weight: 700; color: var(--clr-teal-dark); letter-spacing: .05em; margin-bottom: 4px; }
    .ic-action-body { font-size: 13.5px; font-weight: 600; color: var(--clr-text); line-height: 1.55; }
    /* Plant-character extras */
    .ic-nutri { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
    .ic-nutri-cell { background: #fff; border: 1px solid #E8DFCC; border-radius: 12px; padding: 10px 11px; }
    .ic-nutri-lbl { font-size: 10.5px; font-weight: 700; color: #5C4A2E; letter-spacing: .04em; margin-bottom: 5px; }
    .ic-nutri-body { font-size: 12px; color: var(--clr-text); line-height: 1.6; }
    .ic-pals { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .ic-pal { background: #fff; border: 1px solid #E8DFCC; border-radius: 12px; padding: 10px 11px; display: flex; gap: 10px; align-items: center; }
    .ic-pal img { width: 44px; height: 44px; flex-shrink: 0; object-fit: contain; }
    .ic-pal-text { flex: 1; min-width: 0; }
    .ic-pal-lbl { font-size: 10.5px; font-weight: 700; color: #5C4A2E; letter-spacing: .04em; margin-bottom: 3px; }
    .ic-pal-name { font-size: 14px; font-weight: 800; color: var(--clr-text); margin-bottom: 2px; }
    .ic-pal-reason { font-size: 11px; color: var(--clr-text-sec); line-height: 1.45; }
    @media (max-width: 480px) {
      .infocard-title { font-size: 24px; padding-right: 70px; }
      .infocard-eyebrow { padding-right: 70px; }
      .infocard-mascot { width: 70px; height: 70px; }
      .ic-stat-main { font-size: 14px; }
      .ic-nutri { grid-template-columns: 1fr; }
      .ic-pals { grid-template-columns: 1fr; }
    }
    .email-box { border: 1px solid var(--clr-border); border-radius: var(--radius-md); padding: 16px; margin: 0 0 1.5rem; background: var(--clr-surface); }
    .email-box.compact { padding: 12px 14px; margin-bottom: 1rem; }
    .email-box-hd { font-size: 13px; font-weight: 600; color: var(--clr-text); margin-bottom: 4px; line-height: 1.4; }
    .email-box-sub { font-size: 12px; color: var(--clr-text-sec); margin-bottom: 10px; line-height: 1.6; }
    .email-row { display: flex; gap: 8px; }
    .email-input { flex: 1; padding: 10px 12px; border: 1px solid var(--clr-border-md); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font); background: var(--clr-bg); color: var(--clr-text); min-width: 0; }
    .email-input:focus { outline: none; border-color: var(--clr-teal); }
    .email-btn { padding: 10px 16px; background: var(--clr-teal); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; transition: background .15s; }
    .email-btn:hover:not(:disabled) { background: var(--clr-teal-dark); }
    .email-btn:disabled { opacity: .5; cursor: default; }
    .email-msg { font-size: 12px; margin-top: 8px; line-height: 1.5; }
    .email-msg.ok { color: var(--clr-teal-dark); }
    .email-msg.err { color: #C0392B; }
    /* LINE@ CTA card */
    .linea-cta-card { background: #EFF6F1; border-radius: var(--radius-md); padding: 24px 20px; margin: 1.5rem 0; text-align: center; }
    .linea-cta-title { font-size: 16px; font-weight: 700; color: var(--clr-text); margin-bottom: 10px; }
    .linea-cta-desc { font-size: 13px; color: var(--clr-text-sec); line-height: 1.7; margin-bottom: 16px; }
    .linea-cta-btn { display: inline-block; padding: 14px 32px; background: var(--clr-teal-dark); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; text-decoration: none; cursor: pointer; font-family: var(--font); transition: background .15s; }
    .linea-cta-btn:hover { background: var(--clr-teal-deeper); }
    /* Compact email box (secondary) */
    .email-box.small { padding: 14px 16px; margin-top: 1rem; margin-bottom: 1rem; background: transparent; border: none; }
    .email-box.small .email-box-hd, .email-box.small .email-box-sub { display: none; }
    .email-box.small .email-box-hint { font-size: 12px; color: var(--clr-text-hint); margin-bottom: 8px; text-align: center; }
    .email-box.small .email-row { justify-content: center; }
    .email-box.small .email-input { max-width: 220px; padding: 8px 10px; font-size: 12px; }
    .email-box.small .email-btn { padding: 8px 14px; font-size: 12px; }
    .email-box.small .email-msg { text-align: center; }
    @media (max-width: 480px) { .email-row { flex-direction: column; } .email-btn { width: 100%; } .linea-cta-btn { width: 100%; } .email-box.small .email-input { max-width: none; } }
    .cover { padding: 1rem 0 1rem; text-align: left; }
    .cover-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .12em; color: var(--clr-teal-dark); margin-bottom: 1.25rem; text-transform: uppercase; }
    .cover-title { font-size: 28px; font-weight: 700; line-height: 1.3; color: var(--clr-text); margin-bottom: 1.25rem; letter-spacing: .02em; }
    .cover-lead { font-size: 14px; color: var(--clr-text-sec); line-height: 1.85; margin-bottom: 1.25rem; }
    .cover-lead b { color: var(--clr-text); font-weight: 600; }
    .cover-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--clr-text-hint); margin-bottom: 1.5rem; padding: 12px 14px; background: var(--clr-surface); border-radius: var(--radius-sm); }
    .cover-hint { font-size: 13px; color: var(--clr-text-sec); line-height: 1.75; margin-bottom: 1.75rem; padding-left: 12px; border-left: 2px solid var(--clr-teal); }
    .cover-cta { width: 100%; padding: 14px; font-size: 15px; font-weight: 600; }
    @media (max-width: 480px) { .cover-title { font-size: 24px; } }
    @media (max-width: 480px) {
      .qc { padding: 1.25rem 1rem 2.5rem; }
      .q-title { font-size: 16px; }
      .freq-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>
<div class="qc" id="qc">
  <div class="prog-out"><div class="prog-in" id="prog" style="width:0%"></div></div>
  <div id="content"></div>
</div>
<script>
var SUPABASE_URL = "https://rtnnfykmbejsmcloovre.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0bm5meWttYmVqc21jbG9vdnJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTIzNDQsImV4cCI6MjA5MDQ4ODM0NH0.z9qexqfj4yhsIakygRx660NlDgYH-48xqr_PCQkEuRU";

var DIMS  = ["身體感知","情緒調節","思維模式","行為模式","社會連結"];
var DCOLS = ["#1D9E75","#7F77DD","#D85A30","#BA7517","#378ADD"];
var FREQ  = ["幾乎沒有","偶爾（1-2次）","常常（3-4次）","幾乎每天"];

function sendQuizResult(suffix) {
  var input = document.getElementById("email" + suffix);
  var btn = document.getElementById("email" + suffix + "Btn");
  var msg = document.getElementById("email" + suffix + "Msg");
  var email = (input.value || "").trim();
  msg.className = "email-msg";
  msg.textContent = "";
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    msg.className = "email-msg err";
    msg.textContent = "請輸入有效的 email 地址。";
    return;
  }
  var s = window.__quizSummary;
  if (!s) {
    msg.className = "email-msg err";
    msg.textContent = "找不到測驗結果，請重新整理頁面。";
    return;
  }
  btn.disabled = true;
  btn.textContent = "寄送中…";

  // 1. Save to DB
  var insertPromise = fetch(SUPABASE_URL + "/rest/v1/quiz_results", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=minimal",
    },
    body: JSON.stringify({
      email: email,
      state_key: s.state_key,
      state_name: s.state_name,
      state_title: s.state_title,
      dim_body: s.dim_body, dim_emotion: s.dim_emotion, dim_thought: s.dim_thought,
      dim_behavior: s.dim_behavior, dim_social: s.dim_social,
      pct_sym: s.pct_sym, pct_dor: s.pct_dor, pct_ven: s.pct_ven,
      avg_well: s.avg_well, raw_answers: s.raw_answers,
      source: "quiz-page",
    }),
  });

  // 2. Send email via edge function
  var idem = "quiz-" + email + "-" + Date.now();
  var emailPromise = fetch(SUPABASE_URL + "/functions/v1/send-transactional-email", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      templateName: "quiz-result",
      recipientEmail: email,
      idempotencyKey: idem,
      templateData: {
        stateName: s.state_name,
        stateTitle: s.state_title,
        avgWell: s.avg_well,
        topDim: { name: s.top_dim_name, pct: s.top_dim_pct },
        lowDim: { name: s.low_dim_name, pct: s.low_dim_pct },
        dims: [
          { name: DIMS[0], pct: s.dim_body },
          { name: DIMS[1], pct: s.dim_emotion },
          { name: DIMS[2], pct: s.dim_thought },
          { name: DIMS[3], pct: s.dim_behavior },
          { name: DIMS[4], pct: s.dim_social },
        ],
        pctSym: s.pct_sym, pctDor: s.pct_dor, pctVen: s.pct_ven,
        firstTipTitle: s.first_tip_title,
        firstTipBody: s.first_tip_body,
        // plant character
        plantName: s.plant_name,
        plantTagline: s.plant_tagline,
        plantHashtags: s.plant_hashtags,
        plantBodyVoice: s.plant_body_voice,
        plantSharePct: s.plant_share_pct,
        plantNutrients: s.plant_nutrients,
        plantFriend: s.plant_friend,
        plantStranger: s.plant_stranger,
        // full results for email
        dimInsights: s.dim_insights,
        stateTips: s.state_tips,
      },
    }),
  });

  Promise.all([insertPromise, emailPromise]).then(function(results){
    var emailOk = results[1].ok;
    if (emailOk) {
      msg.className = "email-msg ok";
      msg.textContent = "✓ 已寄出！請到信箱查收（也記得看垃圾信件夾）。";
      btn.textContent = "已寄出";
    } else {
      throw new Error("send failed");
    }
  }).catch(function(){
    msg.className = "email-msg err";
    msg.textContent = "寄送失敗，請稍後再試一次。";
    btn.disabled = false;
    btn.textContent = "寄到信箱";
  });
}

   low:{i:"你的社會連結感目前穩固，能在關係裡真實表達和接收支持，這是心理健康非常重要的保護因子。",tip:"深化「安全連結」的質量：和你信任的人分享一件真實的感受，而不只是生活資訊的交換。"}}
];

var DIMMAX = 12;
var cur = -1; // -1 = cover screen
var ans = new Array(QS.length).fill(-1);

function dimScores() {
  var d = [0,0,0,0,0];
  for (var i = 0; i < QS.length; i++) {
    if (ans[i] < 0) continue;
    var sc = QS[i].type === "choice" ? QS[i].opts[ans[i]].s : QS[i].scores[ans[i]];
    d[QS[i].dim] += sc[0];
  }
  return d;
}

function stateScores() {
  var sym=0, dor=0, ven=0;
  for (var i = 0; i < QS.length; i++) {
    if (ans[i] < 0) continue;
    var sc = QS[i].type === "choice" ? QS[i].opts[ans[i]].s : QS[i].scores[ans[i]];
    sym += sc[0]; dor += sc[1]; ven += sc[2];
  }
  return {sym:sym, dor:dor, ven:ven};
}

function overallState() {
  var s = stateScores();
  if (s.ven > s.sym && s.ven > s.dor) return "ven";
  if (s.sym >= s.dor) return "sym";
  return "dor";
}

// 反向計分：傳入「健康分數百分比」（越高越穩定）
function dimLevel(wellPct) {
  if (wellPct >= 70) return {key:"low",  lbl:"相對穩定", bg:"#E1F5EE", tc:"#085041"};
  if (wellPct >= 45) return {key:"mid",  lbl:"輕度張力", bg:"#E6F1FB", tc:"#042C53"};
  return                    {key:"high", lbl:"需要關注", bg:"#FAEEDA", tc:"#633806"};
}

function render() {
  var content = document.getElementById("content");
  var prog = document.getElementById("prog");
  if (cur < 0) {
    prog.style.width = "0%";
    showCover(content);
    return;
  }
  prog.style.width = Math.round(cur / QS.length * 100) + "%";
  if (cur >= QS.length) { showResult(content); return; }
  var q = QS[cur];
  var isFreq = q.type === "freq";
  var body = "";
  if (isFreq) {
    body = '<div class="freq-grid">';
    for (var i = 0; i < FREQ.length; i++) {
      body += '<button class="freq-btn' + (ans[cur]===i?" selected":"") + '" onclick="sel(' + i + ')">' + FREQ[i] + '</button>';
    }
    body += '</div>';
  } else {
    for (var i = 0; i < q.opts.length; i++) {
      body += '<button class="opt-btn' + (ans[cur]===i?" selected":"") + '" onclick="sel(' + i + ')"><span class="opt-ltr">' + "ABCD"[i] + '</span>' + q.opts[i].t + '</button>';
    }
  }
  var isLast = cur === QS.length - 1;
  content.innerHTML =
    '<p class="dim-lbl">' + (cur+1) + ' / ' + QS.length + '　·　' + DIMS[q.dim] + '</p>' +
    '<p class="q-title">' + q.q + '</p>' +
    '<p class="q-sub">' + q.sub + '</p>' +
    body +
    '<div class="nav-row">' +
    '<button class="btn-back" onclick="goBack()" style="' + (cur===0?"visibility:hidden":"") + '">← 上一題</button>' +
    '<button class="btn-next' + (isLast?" primary":"") + '" onclick="goNext()"' + (ans[cur]<0?" disabled":"") + '>' + (isLast?"查看我的全景圖 →":"下一題") + '</button>' +
    '</div>';
}

function showCover(content) {
  content.innerHTML =
    '<div class="cover">' +
    '<p class="cover-eyebrow">KAIA · 神經系統自我覺察</p>' +
    '<h1 class="cover-title">神經系統<br/>身心狀態全景測驗</h1>' +
    '<p class="cover-lead"><b>你的身體比你更早知道你的狀態。</b></p>' +
    '<p class="cover-lead">可能是睡醒了還是累、可能是明明沒做什麼卻無法放鬆、可能是身邊有人，卻仍感覺一個人。</p>' +
    '<p class="cover-lead">這份測驗的設計，來自一個我在工作中反覆觀察到的現象：很多人知道自己「壓力很大」，卻不太清楚自己的身心正在以哪種方式回應這個壓力。</p>' +
    '<p class="cover-lead">測驗的框架來自神經科學家 Stephen Porges 提出的多重迷走神經理論，核心概念是——我們的神經系統會在不同情境下自動切換三種狀態：<b>高度警戒的備戰、沉重麻木的關閉、或是穩定安全的連結</b>。這三種狀態不是性格問題，而是身體保護自己的方式。</p>' +
    '<p class="cover-lead">五個向度（<b>身體感知、情緒調節、思維模式、行為模式、社會連結</b>）則是我根據這個理論框架延伸設計的，目的是讓你看見不同面向的自己，而不只是得到一個分數。</p>' +
    '<p class="cover-lead">這不是臨床診斷工具，是一個讓你停下來、看看自己的邀請。</p>' +
    '<div class="cover-meta"><span>· 約 5 分鐘</span><span>· 共 15 題</span><span>· 完全匿名</span></div>' +

    '<button class="btn-next primary cover-cta" onclick="startQuiz()">開始測驗 →</button>' +
    '</div>';
}

function startQuiz() { cur = 0; window.scrollTo({top:0, behavior:"smooth"}); render(); }

function sel(i) { ans[cur] = i; render(); }
function goBack() { if (cur > 0) { cur--; render(); } }
function goNext() { if (ans[cur] < 0) return; cur++; render(); }

function showResult(content) {
  document.getElementById("prog").style.width = "100%";

  var st = STATES[key];
  var ds = dimScores();
  var s = stateScores();
  var tot = s.sym + s.dor + s.ven || 1;
  var sp = Math.round(s.sym/tot*100);
  var dp = Math.round(s.dor/tot*100);
  var vp = Math.round(s.ven/tot*100);

  var tipsHtml = "";
  for (var i = 0; i < st.tips.length; i++) {

  // 摘要卡：找出最穩定（高分）與最需關注（低分）的向度
  var maxIdx = 0, minIdx = 0;
  for (var k = 1; k < wellPcts.length; k++) {
    if (wellPcts[k] > wellPcts[maxIdx]) maxIdx = k;
    if (wellPcts[k] < wellPcts[minIdx]) minIdx = k;
  }
  var lowDimLv = dimLevel(wellPcts[minIdx]);
  var lowDimData = DIMDATA[minIdx][lowDimLv.key];
  var firstTip = st.tips[0];
  var avgWell = Math.round(wellPcts.reduce(function(a,b){return a+b;},0) / wellPcts.length);

  var plant = PLANTS[key];

  var bodyVoiceLine = plant.bodyVoice;

  // 養分區塊
  var nutriHtml = '<div class="ic-nutri">';

    nutriHtml +=
      '<div class="ic-nutri-cell">' +

  nutriHtml += '</div>';

  // 合拍 / 暫時不合拍植物
  var palsHtml =
    '<div class="ic-pals">' +
      '<div class="ic-pal">' +
        '<img src="' + plant.friend.img + '" alt="" />' +
        '<div class="ic-pal-text">' +
          '<div class="ic-pal-lbl">合拍植物</div>' +

        '</div>' +
      '</div>' +
      '<div class="ic-pal">' +
        '<img src="' + plant.stranger.img + '" alt="" />' +
        '<div class="ic-pal-text">' +

        '</div>' +
      '</div>' +
    '</div>';

  var summaryCard =
    '<div class="infocard">' +
      '<img class="infocard-mascot" src="' + plant.img + '" alt="" />' +
      '<div class="infocard-eyebrow">你的身體目前最像哪一種植物…</div>' +
      '<div class="infocard-title" style="color:' + st.tc + '">' + plant.name + '</div>' +
      '<div class="infocard-tags">' + tagsHtml + '</div>' +
      '<div class="infocard-stat">' + plant.tagline + '<br/>整體穩定度 <b>' + avgWell + '%</b>　·　約 <b>' + plant.sharePct + '%</b> 的人和你是同款植物</div>' +
      '<div class="ic-block">' +
        '<div class="ic-block-hd"><span class="ic-emoji">🌿</span>身體想跟你說</div>' +
        '<div class="ic-block-body quote">' + bodyVoiceLine + '</div>' +
      '</div>' +
      '<div class="ic-stats">' +
        '<div class="ic-stat">' +
          '<div class="ic-stat-hd">最有力的部分</div>' +
          '<div class="ic-stat-body">' +
            '<div class="ic-stat-main" style="color:' + DCOLS[maxIdx] + '">' + DIMS[maxIdx] + '</div>' +
            '<div class="ic-stat-sub">' + wellPcts[maxIdx] + '% 穩定</div>' +
          '</div>' +
        '</div>' +
        '<div class="ic-stat">' +
          '<div class="ic-stat-hd">整體穩定度</div>' +

            '<div class="ic-stat-main" style="color:' + st.tc + '">' + avgWell + '%</div>' +

          '</div>' +
        '</div>' +
        '<div class="ic-stat">' +
          '<div class="ic-stat-hd">最想被照顧</div>' +
          '<div class="ic-stat-body">' +
            '<div class="ic-stat-main" style="color:' + DCOLS[minIdx] + '">' + DIMS[minIdx] + '</div>' +
            '<div class="ic-stat-sub">' + wellPcts[minIdx] + '% 穩定</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      nutriHtml +
      palsHtml +
      '<div class="ic-action">' +
        '<div class="ic-action-icon">🌱</div>' +
        '<div class="ic-action-text">' +
          '<div class="ic-action-lbl">今天可以做的一件小事</div>' +
          '<div class="ic-action-body">' + firstTip.t + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';


  // 把摘要資料快取到 window，供 email handler 使用
  window.__quizSummary = {
    state_key: key,
    state_name: st.name,
    state_title: st.title,
    avg_well: avgWell,
    dim_body: wellPcts[0], dim_emotion: wellPcts[1], dim_thought: wellPcts[2],
    dim_behavior: wellPcts[3], dim_social: wellPcts[4],
    pct_sym: sp, pct_dor: dp, pct_ven: vp,
    top_dim_name: DIMS[maxIdx], top_dim_pct: wellPcts[maxIdx],
    low_dim_name: DIMS[minIdx], low_dim_pct: wellPcts[minIdx],
    first_tip_title: firstTip.t, first_tip_body: firstTip.b,
    raw_answers: ans.slice(),
    // plant payload for email
    plant_name: plant.name,
    plant_tagline: plant.tagline,
    plant_hashtags: plant.hashtags,
    plant_body_voice: plant.bodyVoice,
    plant_share_pct: plant.sharePct,
    plant_nutrients: plant.nutrients,
    plant_friend: plant.friend,
    plant_stranger: plant.stranger,
    // dim insights for email
    dim_insights: wellPcts.map(function(p, idx){
      var lv = dimLevel(p);
      var dd = DIMDATA[idx][lv.key];
      return { name: DIMS[idx], pct: p, level: lv.lbl, insight: dd.i, tip: dd.tip };
    }),
    // state-level tips (3)
    state_tips: st.tips,
  };

  var lineaCta =
    '<div class="linea-cta-card">' +
      '<div class="linea-cta-title">想把這些練習真正做起來？</div>' +
      '<div class="linea-cta-desc">加入LINE@，每月收到免費線上正念陰瑜珈體驗連結、身心照顧資源，和最新課程通知。</div>' +
      '<a class="linea-cta-btn" href="https://lin.ee/WJcPZiC" target="_blank" rel="noopener noreferrer">加入LINE@</a>' +
    '</div>';

  var emailBottomBox =
    '<div class="email-box small">' +
      '<div class="email-box-hint">或是將結果寄到信箱，方便日後回查</div>' +
      '<div class="email-row">' +
        '<input type="email" class="email-input" id="emailBottom" placeholder="your@email.com" autocomplete="email" />' +
        '<button class="email-btn" id="emailBottomBtn" onclick="sendQuizResult(\'Bottom\')">寄到信箱</button>' +
      '</div>' +
      '<div class="email-msg" id="emailBottomMsg"></div>' +
    '</div>';

  content.innerHTML =
    '<span class="state-badge" style="background:' + st.bg + ';color:' + st.tc + '">' + st.name + '</span>' +
    '<p class="result-title">' + st.title + '</p>' +
    '<p class="result-desc">' + st.desc + '</p>' +
    summaryCard +
    '<p class="sec-lbl">你的五向度全景圖</p>' +
    '<div class="radar-wrap"><canvas id="radar" role="img" aria-label="五向度神經系統狀態雷達圖"></canvas></div>' +
    '<div class="panorama-legend">這張圖把你的五個面向同時攤開來看，形成一個「面」。<br/>' +
    '<b>越往外延伸（面越大）</b>＝該面向越穩定、負擔越小，越不需要擔心；<br/>' +
    '<b>越靠近中心（面越小）</b>＝該面向目前承受的壓力越大，越需要被關注。<br/>越接近完整正圓，代表整體越穩定；某個方向特別內凹，就是身體在告訴你「這裡需要被照顧」。</div>' +
    '<div class="kaia-note">' +
    '<p class="kaia-note-hd">KAIA 給你的悄悄話</p>' +
    '<p class="kaia-note-body">你或許沒有察覺，但在剛剛回答這 15 道題的時候，你已經在做身體覺察了。每一次停下來感受「我現在是不是這樣」，都是身體與你對話的瞬間。這份能力本來就在你身上，你只是重新練習傾聽它。看見，就是改變的開始。</p>' +
    '</div>' +
    '<div class="divider"></div>' +
    '<p class="sec-lbl">五個向度全景解析</p>' +
    dimHtml +
    '<div class="divider"></div>' +
    '<p class="sec-lbl">整體神經狀態的身心調適建議</p>' +
    '<div class="sbar-section">' +
    '<div class="sbar-row"><span class="sbar-lbl">備戰狀態</span><div class="sbar-track"><div class="sbar-fill" id="sb0" style="width:0%;background:#EF9F27"></div></div><span class="sbar-pct" id="sp0">0%</span></div>' +
    '<div class="sbar-row"><span class="sbar-lbl">低電狀態</span><div class="sbar-track"><div class="sbar-fill" id="sb1" style="width:0%;background:#85B7EB"></div></div><span class="sbar-pct" id="sp1">0%</span></div>' +
    '<div class="sbar-row"><span class="sbar-lbl">安穩狀態</span><div class="sbar-track"><div class="sbar-fill" id="sb2" style="width:0%;background:#1D9E75"></div></div><span class="sbar-pct" id="sp2">0%</span></div>' +
    '</div>' +
    tipsHtml +
    lineaCta +
    emailBottomBox +
    '<div class="divider"></div>' +
    '<p class="disclaimer">這份測驗依據多重迷走神經理論設計，是自我探索的參考工具，無法取代專業心理健康評估。如果你的狀態已持續困擾日常生活，建議尋求專業心理師協助。</p>' +
    '<button class="restart-btn" onclick="restart()">重新測驗</button>';

  setTimeout(function() {
    document.getElementById("sb0").style.width = sp+"%"; document.getElementById("sp0").textContent = sp+"%";
    document.getElementById("sb1").style.width = dp+"%"; document.getElementById("sp1").textContent = dp+"%";
    document.getElementById("sb2").style.width = vp+"%"; document.getElementById("sp2").textContent = vp+"%";
    
    new Chart(document.getElementById("radar"), {
      type: "radar",
      data: {
        labels: DIMS,
        datasets: [{
          data: wellPcts,
          backgroundColor: "rgba(29,158,117,0.12)",
          borderColor: "#1D9E75", borderWidth: 1.5,
          pointBackgroundColor: DCOLS, pointBorderColor: DCOLS,
          pointRadius: 4, pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { r: { min:0, max:100,
          ticks: { stepSize:25, display:false },
          grid: { color:"rgba(0,0,0,0.07)", lineWidth:0.5 },
          angleLines: { color:"rgba(0,0,0,0.07)", lineWidth:0.5 },
          pointLabels: { font:{ size:11 }, color:"rgba(0,0,0,0.45)" }
        }}
      }
    });
  }, 150);
}

function restart() {
  cur = -1;
  ans = new Array(QS.length).fill(-1);
  window.scrollTo({top:0, behavior:"smooth"});
  render();
}

// Demo mode: ?demo=sym | dor | ven 直接跳到結果頁，不必做測驗
(function(){
  var m = (location.search.match(/[?&]demo=(sym|dor|ven)/) || [])[1];
  if (!m) { render(); return; }
  // 為每題挑一個分數偏向指定狀態的選項
  var idxMap = { sym: 0, dor: 1, ven: 2 };
  var target = idxMap[m];
  for (var i = 0; i < QS.length; i++) {
    var q = QS[i];
    var opts = q.type === "choice" ? q.opts.map(function(o){return o.s;}) : q.scores;
    var best = 0, bestVal = -1;
    for (var j = 0; j < opts.length; j++) {
      if (opts[j][target] > bestVal) { bestVal = opts[j][target]; best = j; }
    }
    ans[i] = best;
  }
  cur = QS.length;
  render();
})();
